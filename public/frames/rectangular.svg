<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Left lens -->
  <rect x="60" y="60" width="120" height="40" rx="5"
    stroke="#1a1a1a" stroke-width="2"
    fill="rgba(0,0,0,0.08)" />
  <!-- Right lens -->
  <rect x="220" y="60" width="120" height="40" rx="5"
    stroke="#1a1a1a" stroke-width="2"
    fill="rgba(0,0,0,0.08)" />
  <!-- Bridge -->
  <path d="M180 80 L220 80"
    stroke="#1a1a1a" stroke-width="2" />
  <!-- Temple arms -->
  <line x1="60" y1="80" x2="0" y2="80"
    stroke="#1a1a1a" stroke-width="2"/>
  <line x1="340" y1="80" x2="400" y2="80"
    stroke="#1a1a1a" stroke-width="2"/>
</svg>
